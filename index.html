<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Graphwar</title>
<style>
  body {
    margin: 0;
    background: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Trebuchet MS', sans-serif;
  }
  #app {
    width: 800px;
    background: #9ed79b;
    border: 4px solid #333;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
  }
  .screen { display: none; padding: 20px; box-sizing: border-box; }
  .screen.active { display: block; }
  h1.title {
    text-align: center;
    font-size: 64px;
    color: #f4a300;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
    margin: 20px 0 40px 0;
    font-weight: 900;
  }
  .menu-buttons { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .menu-buttons img { cursor: pointer; transition: transform 0.1s; }
  .menu-buttons img:hover { transform: scale(1.05); }
  #setupScreen .panel {
    background: rgba(0,0,0,0.15);
    border-radius: 10px;
    padding: 20px;
    max-width: 500px;
    margin: 0 auto;
  }
  .player-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .player-row input[type=text] { flex: 1; padding: 6px; border-radius: 4px; border: 1px solid #555; }
  .player-row button { cursor: pointer; }
  .btn {
    background: #222;
    color: #f4a300;
    border: 2px solid #f4a300;
    border-radius: 6px;
    padding: 8px 16px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
  }
  .btn:hover { background: #f4a300; color: #222; }
  .btn.danger { border-color: #e63946; color: #e63946; }
  .btn.danger:hover { background: #e63946; color: #fff; }
  #gameScreen { padding: 10px; }
  #turnBanner {
    text-align: center;
    font-weight: bold;
    color: #222;
    background: rgba(255,255,255,0.7);
    border-radius: 6px;
    padding: 4px 0;
    margin-bottom: 6px;
  }
  #canvasWrap { position: relative; }
  canvas { display: block; margin: 0 auto; background: #87ceeb; border-radius: 4px; }
  #controls {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  #funcInput { padding: 8px; width: 260px; border-radius: 4px; border: 1px solid #555; font-size: 15px; }
  #dirBtn { font-size: 20px; }
  #errorMsg { color: #b00020; text-align: center; min-height: 20px; font-size: 13px; }
  #endOverlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center; flex-direction: column;
  }
  #endOverlay.active { display: flex; }
  #endOverlay h2 { color: #f4a300; font-size: 40px; }
</style>
</head>
<body>
<div id="app">

  <!-- MENU PRINCIPAL -->
  <div id="menuScreen" class="screen active">
    <h1 class="title">Graphwar</h1>
    <div class="menu-buttons">
      <img id="btnPlay" src="rsc/createGame.png" alt="Jugar">
    </div>
    <p style="text-align:center; margin-top:30px; color:#333; font-size:13px;">
      Version web hecha con los graficos originales de Graphwar (GPLv3)
    </p>
  </div>

  <!-- CONFIGURACION -->
  <div id="setupScreen" class="screen">
    <h1 class="title" style="font-size:36px;">Configurar partida</h1>
    <div class="panel">
      <div id="playerList"></div>
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="btn" id="addHuman">+ Jugador</button>
        <button class="btn" id="addBot">+ Bot</button>
      </div>
      <div id="setupError" style="color:#b00020; margin-top:10px; min-height:18px;"></div>
      <div style="display:flex; justify-content:space-between; margin-top:20px;">
        <button class="btn danger" id="backToMenu">Volver</button>
        <button class="btn" id="startGame">Empezar partida</button>
      </div>
    </div>
  </div>

  <!-- JUEGO -->
  <div id="gameScreen" class="screen">
    <div id="turnBanner">Turno de ...</div>
    <div id="canvasWrap">
      <canvas id="canvas" width="800" height="510"></canvas>
      <div id="endOverlay">
        <h2 id="endText">Fin de la partida</h2>
        <button class="btn" id="backToMenu2">Volver al menu</button>
      </div>
    </div>
    <div id="controls">
      <button class="btn" id="dirBtn">⟵</button>
      <input id="funcInput" type="text" placeholder="ej: x^2/50 , sin(x)*5 , 2*x+3">
      <img id="fireBtn" src="rsc/fire.png" style="cursor:pointer;" alt="Disparar">
    </div>
    <div id="errorMsg"></div>
  </div>

</div>

<script src="game.js"></script>
<script>
const menuScreen = document.getElementById('menuScreen');
const setupScreen = document.getElementById('setupScreen');
const gameScreen = document.getElementById('gameScreen');

function showScreen(el) {
  [menuScreen, setupScreen, gameScreen].forEach(s => s.classList.remove('active'));
  el.classList.add('active');
}

document.getElementById('btnPlay').onclick = () => {
  showScreen(setupScreen);
  renderPlayerList();
};
document.getElementById('backToMenu').onclick = () => showScreen(menuScreen);
document.getElementById('backToMenu2').onclick = () => {
  document.getElementById('endOverlay').classList.remove('active');
  showScreen(menuScreen);
};

// ---------- Configuracion de jugadores ----------
let players = [
  { name: 'Jugador 1', isBot: false },
  { name: 'Bot 1', isBot: true },
];
const botNames = ['Deep Thought', 'HAL', 'Skynet', 'Agente Smith', 'Multivac', 'Cleverbot'];

function renderPlayerList() {
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  players.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = `
      <span>${p.isBot ? '🤖' : '🧑'}</span>
      <input type="text" value="${p.name}" data-idx="${i}">
      <button class="btn danger" data-remove="${i}">X</button>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll('input').forEach(inp => {
    inp.oninput = (e) => { players[e.target.dataset.idx].name = e.target.value; };
  });
  list.querySelectorAll('[data-remove]').forEach(btn => {
    btn.onclick = (e) => {
      if (players.length <= 2) { document.getElementById('setupError').textContent = 'Necesitas al menos 2 jugadores.'; return; }
      players.splice(parseInt(e.target.dataset.remove), 1);
      renderPlayerList();
    };
  });
}

document.getElementById('addHuman').onclick = () => {
  if (players.length >= 6) return;
  players.push({ name: 'Jugador ' + (players.length + 1), isBot: false });
  renderPlayerList();
};
document.getElementById('addBot').onclick = () => {
  if (players.length >= 6) return;
  const name = botNames[Math.floor(Math.random() * botNames.length)];
  players.push({ name, isBot: true });
  renderPlayerList();
};

// ---------- Partida ----------
let game = null;
let direction = 1;
let animRunning = false;

document.getElementById('startGame').onclick = async () => {
  if (players.length < 2) {
    document.getElementById('setupError').textContent = 'Necesitas al menos 2 jugadores.';
    return;
  }
  await loadAllImages();
  const canvas = document.getElementById('canvas');
  game = new GraphwarGame(canvas, players);
  showScreen(gameScreen);
  document.getElementById('endOverlay').classList.remove('active');
  updateTurnBanner();
  if (!animRunning) { animRunning = true; requestAnimationFrame(loop); }
  maybeBotTurn();
};

function currentPlayerName() {
  const s = game.currentSoldier();
  return game.players[s.playerIndex].name;
}

function updateTurnBanner() {
  if (!game || game.state === 'gameover') return;
  document.getElementById('turnBanner').textContent = 'Turno de ' + currentPlayerName();
}

document.getElementById('dirBtn').onclick = () => {
  direction *= -1;
  document.getElementById('dirBtn').textContent = direction === 1 ? '⟶' : '⟵';
};

function doFire() {
  if (!game || game.state !== 'playing') return;
  const expr = document.getElementById('funcInput').value.trim();
  if (!expr) { document.getElementById('errorMsg').textContent = 'Escribe una funcion, ej: x^2/50'; return; }
  const res = game.fire(expr, direction);
  if (!res.ok) {
    document.getElementById('errorMsg').textContent = res.error;
    return;
  }
  document.getElementById('errorMsg').textContent = '';
  document.getElementById('funcInput').value = '';
}

document.getElementById('fireBtn').onclick = doFire;
document.getElementById('funcInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doFire();
});

function maybeBotTurn() {
  if (!game || game.state !== 'playing') return;
  const shooter = game.currentSoldier();
  const player = game.players[shooter.playerIndex];
  if (!player.isBot) return;

  setTimeout(() => {
    if (!game || game.state !== 'playing') return;
    const enemies = game.aliveSoldiers().filter(s => s.teamIndex !== shooter.teamIndex);
    if (enemies.length === 0) return;
    const target = enemies[Math.floor(Math.random() * enemies.length)];
    const x0 = invConvertX(shooter.x), y0 = invConvertY(shooter.y);
    const x1 = invConvertX(target.x), y1 = invConvertY(target.y);
    let slope = (y1 - y0) / (x1 - x0 || 0.0001);
    slope *= (0.8 + Math.random() * 0.4);
    const dir = x1 >= x0 ? 1 : -1;
    const expr = Math.abs(slope) < 0.001 ? '0*x' : (slope.toFixed(3) + '*x');
    game.fire(expr, dir);
  }, 900 + Math.random() * 700);
}

let lastTurnState = null;
function loop() {
  if (game) {
    game.update();
    game.draw();
    if (game.state === 'gameover' && lastTurnState !== 'gameover') {
      const overlay = document.getElementById('endOverlay');
      const text = document.getElementById('endText');
      if (game.winner !== null) {
        text.textContent = '¡Gana ' + (game.players[game.winner] ? game.players[game.winner].name : 'un jugador') + '!';
      } else {
        text.textContent = 'Empate';
      }
      overlay.classList.add('active');
    }
    if (lastTurnState !== game.state) {
      if (game.state === 'playing') { updateTurnBanner(); maybeBotTurn(); }
    }
    lastTurnState = game.state;
  }
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
