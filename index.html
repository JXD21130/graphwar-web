<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Graphwar</title>
  <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
  <style>
    body { margin: 0; background: black; }
    #display { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="display"></div>
  <script>
    (async () => {
      await cheerpjInit();
      cheerpjCreateDisplay(-1, -1, document.getElementById("display"));
      await cheerpjRunJar("/app/graphwar.jar");
    })();
  </script>
</body>
</html>
